<style>

/* Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-text-size-adjust:100%;
}

/* Base */

html,body{
width:100%;
background:#ffffff;
overflow-x:hidden;
font-family:'Arimo',sans-serif;
}

/* Main Container */

.container{
position:relative;
width:100%;
max-width:772px;
margin:auto;
background:#ffffff;
cursor:pointer;
}

/* Certificate Image */

.container img{
width:100%;
height:auto;
display:block;
object-fit:contain;
user-select:none;
-webkit-user-drag:none;
}

/* Overlay Text */

.info{

position:absolute;

top:59.9%;

left:7.5%;

width:86%;

font-size:3.57vw;

line-height:1.32;

color:#4a4a4a;

}

/* Bold Labels */

.label{
font-weight:700;
}

/* Rows */

.row{
margin-bottom:0.15vw;
}

/* Desktop */

@media (min-width:772px){

.info{

font-size:27.6px;

}

.row{
margin-bottom:2px;
}

}

/* Mobile Fine Tuning */

@media (max-width:480px){

.info{

font-size:3.57vw;

}

}

</style>

</head>

<div class="container"
onclick="window.location.href='https://www.nebosh.org.uk/'">
