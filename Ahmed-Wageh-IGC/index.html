<style>
  /* إعادة تعيين كامل */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    background: #ffffff;
    font-family: 'Arimo', sans-serif;
    overflow-x: hidden;
  }

  /* الحاوية الرئيسية - تمتد بعرض الشاشة كاملاً على الموبايل */
  .container {
    position: relative;
    width: 100%;
    background: #ffffff;
    cursor: pointer;
  }

  /* الصورة تغطي العرض بالكامل وتحافظ على نسبتها */
  .container img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* النص المتراكب بنفس الموضع الدقيق */
  .info {
    position: absolute;
    top: 59.9%;
    left: 7.5%;
    width: 86%;
    font-size: 3.57vw;
    line-height: 1.32;
    color: #4a4a4a;
    pointer-events: none; /* لضمان أن النقر يمر إلى الصورة */
  }

  .label {
    font-weight: 700;
  }

  .row {
    margin-bottom: 0.15vw;
  }

  /* فقط للشاشات العريضة (أكبر من 772px) يتم توسيط الصورة بحد أقصى */
  @media (min-width: 772px) {
    .container {
      max-width: 772px;
      margin: 0 auto;
    }
    .info {
      font-size: 27.6px;
    }
    .row {
      margin-bottom: 2px;
    }
  }

  /* تحسين بسيط للشاشات الصغيرة جداً */
  @media (max-width: 480px) {
    .info {
      font-size: 4vw;
    }
  }
</style>
