<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEBOSH VALIDATION</title>
  <link rel="icon" type="image/x-icon" href="https://nebosh-validation.verisecure.org/assets/corp_logo.gif">

  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    /* ==================================================================== */
    /* الكود المستخرج من ملف نيبوش الأصلي (مسئول عن المسافات وتجاوب الشاشات) */
    /* ==================================================================== */
    body { margin: 0; font-family: Roboto, Helvetica Neue, sans-serif; height: 100%; background-color: #fafafa; color: rgba(0, 0, 0, .87); }

    /* تقسيم العواميد للاب توب */
    @media (min-width: 800px) {
      .sections-container { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; }
    }
    .sections-container { width: calc(100% - 20px); margin: 0 auto; }

    .fields-container { width: calc(100% - 20px); display: flex; flex-direction: column; padding: 10px; }

    /* المسافات بين الكلام في كل سطر */
    .field-container { display: grid; width: 100%; grid-template-columns: auto 20px 1fr; align-items: center; }
    .field-container > div { margin-bottom: 10px; height: 100%; font-size: 16px; }

    .highlighted { font-weight: 400; border-radius: 20px; padding: 20px; background-color: #e6e6fa; }

    /* تقسيم البوكس التأكيدي للاب توب */
    @media (min-width: 800px) {
      .auth-section { display: grid; grid-template-columns: 1fr auto 1fr; }
    }
    .auth-section { width: calc(100% - 20px); padding: 10px; margin: 0 auto; }

    .auth-container { max-width: 500px; width: 100%; display: flex; flex-direction: column; margin-bottom: 10px; align-items: center; text-align: center; position: relative; z-index: 20; }

    /* المربع والزراير دايماً جنب بعض حتى في الموبايل */
    .auth-inputs { margin-top: 20px; width: 100%; display: flex; flex-direction: row; align-items: center; justify-content: space-between; }

    /* ==================================================================== */
    /* تنسيق مربع الإدخال والزراير عشان تكون طبق الأصل من التصميم (Material)  */
    /* ==================================================================== */
    .input-wrapper { flex: 1; min-width: 0; }
    .custom-auth-input {
      width: 100%; height: 56px; background-color: whitesmoke; border: none;
      border-bottom: 1px solid rgba(0,0,0,0.42); border-radius: 4px 4px 0 0;
      padding: 0 16px; font-family: Roboto, sans-serif; font-size: 16px;
      color: rgba(0,0,0,0.87); box-sizing: border-box; outline: none;
    }
