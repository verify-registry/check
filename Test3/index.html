<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>nebosh VALIDATION</title>
  <style>
    html,body {
      height:100%;
      margin:0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:#ffffff;
      color:#111;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    .wrap {
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
      box-sizing:border-box;
      cursor:pointer;
    }
    #logo {
      max-width:260px;
      width:40%;
      height:auto;
      margin-bottom:20px;
      user-select:none;
      pointer-events:none;
    }
    h1 {
      margin:0 0 12px 0;
      font-size:20px;
      font-weight:600;
    }
    .meta {
      font-size:14px;
      color:#333;
      background:#f6f6f6;
      padding:10px 14px;
      border-radius:8px;
      display:inline-block;
      min-width:260px;
    }
    .label {
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }
    .small {
      font-size:12px;
      color:#666;
      margin-top:8px;
    }
    /* keep focus visible for keyboard users */
    .wrap:focus {
      outline:3px solid rgba(21,156,228,0.25);
      outline-offset:4px;
    }
  </style>
</head>
<body>
  <div class="wrap" id="page" role="button" tabindex="0" aria-label="اضغط في أي مكان للانتقال">
    <img id="logo" src="https://verify-registry.github.io/check/NeboshLogo.jpg" alt="NEBOSH Logo" />
    <h1>nebosh VALIDATION</h1>
    <div class="meta">
      <span class="label">Requested:</span>
      <span id="timestamp">20/05/2026 19:31</span>
      <div class="small">اضغط في أي مكان لتأكيد والتحويل إلى الموقع الأصلي</div>
    </div>
  </div>

  <script>
    // تنسيق التاريخ dd/mm/yyyy HH:MM
    function formatDate(d) {
      const pad = n => String(n).padStart(2,'0');
      const day = pad(d.getDate());
      const month = pad(d.getMonth()+1);
      const year = d.getFullYear();
      const hours = pad(d.getHours());
      const minutes = pad(d.getMinutes());
      return `${day}/${month}/${year} ${hours}:${minutes}`;
    }

    // عند الضغط: يحدث التاريخ ثم ينتقل للموقع بعد تأخير قصير
    function handleClick(e) {
      try {
        const now = new Date();
        const formatted = formatDate(now);
        const ts = document.getElementById('timestamp');
        ts.textContent = formatted;
      } catch(err) {
        // تجاهل الأخطاء واستمر بالانتقال
      }
      // تأخير قصير حتى يرى المستخدم التحديث قبل الانتقال
      setTimeout(function(){
        window.location.href = 'https://verify-registry.github.io/check';
      }, 350);
    }

    // اجعل أي نقرة في الصفحة تعمل
    document.addEventListener('click', function(e){
      // تجاهل النقرات على عناصر تحكم داخلية إن وُجدت (روابط خارجية مستقبلية)
      handleClick(e);
    }, {capture:true});

    // دعم لوحة المفاتيح: Enter أو Space عندما العنصر مركّز
    document.getElementById('page').addEventListener('keydown', function(e){
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handleClick(e);
      }
    });
  </script>
</body>
</html>
