<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generic Validation Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #ffffff;
      color: #000;
      cursor: pointer; /* جعل الصفحة بالكامل قابلة للضغط */
    }

    /* مكان اللوجو العام */
    .logo-container {
      text-align: center;
      margin: 40px 0;
    }

    .logo-placeholder {
      width: 250px;
      height: 80px;
      background-color: #e0e0e0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #757575;
      font-weight: bold;
    }

    /* التقسيم لعمودين على اللاب توب */
    .main-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      padding: 0 30px;
      box-sizing: border-box;
    }

    /* التجاوب مع شاشات الموبايل (عمود واحد) */
    @media (max-width: 800px) {
      .main-grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    h3 {
      font-size: 19px;
      margin-bottom: 20px;
    }

    .data-row {
      display: flex;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .data-label {
      width: 200px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .data-value {
      flex-grow: 1;
    }

    /* صندوق المصادقة العام */
    .action-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 60px;
      padding-bottom: 50px;
    }

    .message-box {
      background-color: #e8eaf6;
      padding: 20px 40px;
      border-radius: 10px;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 600px;
      width: 100%;
      margin-top: 20px;
    }

    .input-mockup {
      background-color: #f5f5f5;
      border-bottom: 1px solid #000;
      padding: 10px 15px;
      width: 250px;
      color: #666;
    }

    .btn-mockup {
      padding: 10px 20px;
      background-color: #e0e0e0;
      border-radius: 4px;
      margin-left: 10px;
      display: inline-block;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <div class="logo-placeholder">LOGO PLACEHOLDER</div>
  </div>

  <div class="main-grid">
    <div>
      <h3>Section 1 Details</h3>
      <div class="data-row">
        <div class="data-label">Field A:</div>
        <div class="data-value">Sample Data A</div>
      </div>
      <div class="data-row">
        <div class="data-label">Field B:</div>
        <div class="data-value">Sample Data B</div>
      </div>
    </div>

    <div>
      <h3>Section 2 Details</h3>
      <div class="data-row">
        <div class="data-label">Field C:</div>
        <div class="data-value">Sample Data C</div>
      </div>
      <div class="data-row">
        <div class="data-label">Time & Date:</div>
        <div class="data-value" id="dynamic-time"></div>
      </div>
    </div>
  </div>

  <div class="action-section">
    <div class="message-box">
      <p>System message placeholder text goes here.</p>
    </div>
    <div class="controls">
      <div class="input-mockup">Input Field</div>
      <div>
        <div class="btn-mockup" style="color: red;">Deny</div>
        <div class="btn-mockup" style="color: green;">Accept</div>
      </div>
    </div>
  </div>

  <script>
    // 1. تحديث الوقت تلقائياً
    function setTime() {
      const dateObj = new Date();
      const dd = String(dateObj.getDate()).padStart(2, '0');
      const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
      const yyyy = dateObj.getFullYear();
      const hh = String(dateObj.getHours()).padStart(2, '0');
      const min = String(dateObj.getMinutes()).padStart(2, '0');
      
      document.getElementById('dynamic-time').innerText = `${dd}/${mm}/${yyyy} ${hh}:${min}`;
    }
    setTime();

    // 2. التحويل عند الضغط
    document.addEventListener('click', function() {
      // ضع الرابط الخاص بك هنا
      window.location.href = "https://example.com";
    });
  </script>

</body>
</html>
